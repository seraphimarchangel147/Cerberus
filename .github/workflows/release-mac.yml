name: Release — signed Mac .dmg + Sparkle appcast

# Triggered when a tag matching v* is pushed (eg. v0.0.2).
# Builds the Mac native app, codesigns with Apple Developer ID, notarizes
# with Apple, signs the .dmg with the Sparkle EdDSA key, generates appcast.xml,
# and uploads both as assets on the corresponding GitHub Release.
#
# Required repository secrets:
#   APPLE_DEVELOPER_ID_CERT_P12_BASE64   - base64 of your Developer ID Application .p12
#   APPLE_DEVELOPER_ID_CERT_PASSWORD     - password for the .p12
#   APPLE_ID                             - Apple ID email used for notarization
#   APPLE_APP_PASSWORD                   - app-specific password from appleid.apple.com
#   APPLE_TEAM_ID                        - 10-char team id (e.g. 3AVR8P72M4)
#   SPARKLE_ED_PRIVATE_KEY               - base64 EdDSA private key from sparkle's generate_keys
#
# Manual setup steps (one time):
#   See docs/RELEASE.md for how to extract each secret.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write   # so we can upload release assets

jobs:
  build-and-publish:
    runs-on: macos-14   # Apple Silicon, Xcode preinstalled
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version from tag
        id: ver
        run: |
          # ${GITHUB_REF#refs/tags/} → "v0.0.2"
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$(date -u +%y%m%d%H%M)" >> "$GITHUB_OUTPUT"

      - name: Cache SwiftPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            mac/.build
            ~/Library/Developer/Xcode/DerivedData
          key: spm-${{ runner.os }}-${{ hashFiles('mac/Package.resolved', 'mac/Package.swift') }}

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Set up signing keychain
        env:
          CERT_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/openagi-release.keychain-db"
          KEYCHAIN_PASS="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          echo "$CERT_P12_BASE64" | base64 -d > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN_PATH" \
            -P "$CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          rm -f "$RUNNER_TEMP/cert.p12"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Detect signing identity
        id: signid
        run: |
          IDENT=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep -oE '"Developer ID Application: [^"]+"' | head -1 | tr -d '"')
          if [[ -z "$IDENT" ]]; then
            echo "::error::No Developer ID Application identity found in keychain"
            exit 1
          fi
          echo "identity=$IDENT" >> "$GITHUB_OUTPUT"

      - name: Build + sign + notarize + DMG
        env:
          SIGN_IDENTITY: ${{ steps.signid.outputs.identity }}
          NOTARIZE: "1"
          DMG: "1"
          AC_USERNAME: ${{ secrets.APPLE_ID }}
          AC_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          AC_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          VERSION: ${{ steps.ver.outputs.version }}
          BUILD_NUM: ${{ steps.ver.outputs.build }}
        run: |
          ./scripts/build-mac-app.sh
          ls -lh build/

      - name: Generate Sparkle appcast.xml
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          DMG_FILE=$(ls build/OpenAGI-*.dmg | head -1)
          [[ -f "$DMG_FILE" ]] || { echo "::error::No .dmg produced"; exit 1; }
          DMG="$DMG_FILE" \
            VERSION="${{ steps.ver.outputs.version }}" \
            BUILD="${{ steps.ver.outputs.build }}" \
            APPCAST="build/appcast.xml" \
            RELEASE_NOTES_URL="https://github.com/Spshulem/openAGI/releases/tag/${{ steps.ver.outputs.tag }}" \
            ./scripts/generate-appcast.sh
          ls -lh build/appcast.xml

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          files: |
            build/OpenAGI-*.dmg
            build/appcast.xml
          generate_release_notes: true
          fail_on_unmatched_files: true

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
